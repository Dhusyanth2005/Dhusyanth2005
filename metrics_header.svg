<svg width="900" height="64" viewBox="0 0 900 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39d353"/>
      <stop offset="55%" stop-color="#39d353" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#39d353" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <rect width="900" height="64" fill="url(#bg)" rx="12"/>

  <!-- dot grid -->
  <g opacity="0.04" fill="#ffffff">
    <circle cx="60" cy="20" r="1"/><circle cx="120" cy="20" r="1"/><circle cx="180" cy="20" r="1"/><circle cx="240" cy="20" r="1"/><circle cx="300" cy="20" r="1"/><circle cx="360" cy="20" r="1"/><circle cx="420" cy="20" r="1"/><circle cx="480" cy="20" r="1"/><circle cx="540" cy="20" r="1"/><circle cx="600" cy="20" r="1"/><circle cx="660" cy="20" r="1"/><circle cx="720" cy="20" r="1"/><circle cx="780" cy="20" r="1"/><circle cx="840" cy="20" r="1"/>
    <circle cx="60" cy="44" r="1"/><circle cx="120" cy="44" r="1"/><circle cx="180" cy="44" r="1"/><circle cx="240" cy="44" r="1"/><circle cx="300" cy="44" r="1"/><circle cx="360" cy="44" r="1"/><circle cx="420" cy="44" r="1"/><circle cx="480" cy="44" r="1"/><circle cx="540" cy="44" r="1"/><circle cx="600" cy="44" r="1"/><circle cx="660" cy="44" r="1"/><circle cx="720" cy="44" r="1"/><circle cx="780" cy="44" r="1"/><circle cx="840" cy="44" r="1"/>
  </g>

  <!-- left accent bar -->
  <rect x="20" y="14" width="4" height="36" rx="2" fill="#39d353"/>

  <!-- title -->
  <text x="34" y="38" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="-0.3">◈ GitHub Metrics</text>

  <!-- fade line -->
  <line x1="222" y1="32" x2="820" y2="32" stroke="url(#fade)" stroke-width="0.8"/>

  <!-- LIVE badge -->
  <rect x="828" y="20" width="46" height="20" rx="4" fill="#39d353" fill-opacity="0.12" stroke="#39d353" stroke-opacity="0.5" stroke-width="0.8"/>
  <circle cx="840" cy="30" r="3" fill="#39d353" opacity="0.85"/>
  <text x="858" y="34" font-family="'Courier New', monospace" font-size="9" fill="#39d353" text-anchor="middle" letter-spacing="0.8">LIVE</text>

  <!-- corner brackets - bottom left -->
  <rect x="20" y="57" width="14" height="1.5" rx="1" fill="#39d353" opacity="0.4"/>
  <rect x="20" y="45" width="1.5" height="14" rx="1" fill="#39d353" opacity="0.4"/>
  <!-- corner brackets - bottom right -->
  <rect x="866" y="57" width="14" height="1.5" rx="1" fill="#39d353" opacity="0.4"/>
  <rect x="878.5" y="45" width="1.5" height="14" rx="1" fill="#39d353" opacity="0.4"/>
</svg>
