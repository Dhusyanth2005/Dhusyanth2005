<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#060d0a"/>
      <stop offset="50%"  stop-color="#0a1a10"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="58%" r="48%">
      <stop offset="0%"   stop-color="#39d353" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#39d353" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="left-glow" cx="0%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#39d353" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#39d353" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="right-glow" cx="100%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#39d353" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#39d353" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="name-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#39d353"/>
    </linearGradient>
    <linearGradient id="bottom-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="role-line-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#39d353" stop-opacity="0"/>
      <stop offset="100%" stop-color="#39d353" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="role-line-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#39d353" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#39d353" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="0"  cy="0"  r="0.8" fill="#39d353" opacity="0.16"/>
      <circle cx="30" cy="0"  r="0.8" fill="#39d353" opacity="0.16"/>
      <circle cx="0"  cy="30" r="0.8" fill="#39d353" opacity="0.16"/>
      <circle cx="30" cy="30" r="0.8" fill="#39d353" opacity="0.16"/>
    </pattern>
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="white" opacity="0.01"/>
    </pattern>
  </defs>

  <!-- Base layers -->
  <rect width="900" height="200" fill="url(#bg)"/>
  <rect width="900" height="200" fill="url(#grid)"/>
  <rect width="900" height="200" fill="url(#center-glow)"/>
  <rect width="900" height="200" fill="url(#left-glow)"/>
  <rect width="900" height="200" fill="url(#right-glow)"/>
  <rect width="900" height="200" fill="url(#scanlines)"/>

  <!-- Circuit traces -->
  <g stroke="#39d353" stroke-opacity="0.07" fill="none" stroke-width="1">
    <line x1="0"   y1="55"  x2="180" y2="55"/>
    <line x1="720" y1="55"  x2="900" y2="55"/>
    <line x1="0"   y1="158" x2="120" y2="158"/>
    <line x1="780" y1="158" x2="900" y2="158"/>
    <line x1="55"  y1="0"   x2="55"  y2="90"/>
    <line x1="845" y1="110" x2="845" y2="200"/>
    <polyline points="180,55 200,55 200,92"/>
    <polyline points="720,55 700,55 700,92"/>
    <polyline points="120,158 100,158 100,122"/>
    <polyline points="780,158 800,158 800,122"/>
  </g>

  <!-- Junction dots -->
  <g fill="#39d353" opacity="0.22">
    <circle cx="180" cy="55"  r="2.5"/>
    <circle cx="720" cy="55"  r="2.5"/>
    <circle cx="120" cy="158" r="2.5"/>
    <circle cx="780" cy="158" r="2.5"/>
    <circle cx="200" cy="92"  r="1.8"/>
    <circle cx="700" cy="92"  r="1.8"/>
  </g>

  <!-- Top chrome bar -->
  <rect x="0" y="0" width="900" height="34" fill="#060d0a" fill-opacity="0.9"/>
  <rect x="0" y="33.5" width="900" height="0.5" fill="#39d353" fill-opacity="0.2"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="17" r="5" fill="#ff5f57" opacity="0.75"/>
  <circle cx="42" cy="17" r="5" fill="#febc2e" opacity="0.75"/>
  <circle cx="62" cy="17" r="5" fill="#28c840" opacity="0.75"/>

  <!-- Tab -->
  <rect x="80" y="7" width="152" height="20" rx="4" fill="#0a1a10" stroke="#39d353" stroke-width="0.5" stroke-opacity="0.4"/>
  <rect x="80" y="7" width="152" height="2" rx="1" fill="#39d353" opacity="0.8"/>
  <text x="156" y="20" font-family="'Courier New', monospace" font-size="9" fill="#39d353" fill-opacity="0.75" text-anchor="middle" letter-spacing="0.5">~/portfolio/dhusyanth.sh</text>

  <!-- OPEN TO WORK pill -->
  <rect x="770" y="9" width="114" height="16" rx="3" fill="#39d353" fill-opacity="0.08" stroke="#39d353" stroke-opacity="0.3" stroke-width="0.6"/>
  <circle cx="783" cy="17" r="3" fill="#39d353" opacity="0.85"/>
  <text x="839" y="21" font-family="'Courier New', monospace" font-size="8.5" fill="#39d353" fill-opacity="0.85" text-anchor="middle" letter-spacing="0.5">OPEN TO WORK</text>

  <!-- Corner brackets -->
  <rect x="14" y="42" width="22" height="1.5" rx="1" fill="#39d353" opacity="0.5"/>
  <rect x="14" y="42" width="1.5" height="22" rx="1" fill="#39d353" opacity="0.5"/>
  <rect x="864" y="42" width="22" height="1.5" rx="1" fill="#39d353" opacity="0.5"/>
  <rect x="884.5" y="42" width="1.5" height="22" rx="1" fill="#39d353" opacity="0.5"/>
  <rect x="14"   y="182" width="22" height="1.5" rx="1" fill="#39d353" opacity="0.22"/>
  <rect x="14"   y="158" width="1.5" height="26" rx="1" fill="#39d353" opacity="0.22"/>
  <rect x="864"  y="182" width="22" height="1.5" rx="1" fill="#39d353" opacity="0.22"/>
  <rect x="884.5" y="158" width="1.5" height="26" rx="1" fill="#39d353" opacity="0.22"/>

  <!-- ── NAME ── -->
  <!-- Soft glow shadow -->
  <text x="452" y="107" font-family="'Segoe UI', 'Arial Black', sans-serif" font-size="68" font-weight="900" fill="#39d353" fill-opacity="0.06" text-anchor="middle" letter-spacing="8">DHUSYANTH S</text>
  <!-- Name -->
  <text x="450" y="104" font-family="'Segoe UI', 'Arial Black', sans-serif" font-size="68" font-weight="900" fill="url(#name-grad)" text-anchor="middle" letter-spacing="8">DHUSYANTH S</text>

  <!-- ── ROLE LINE ── -->
  <line x1="108" y1="124" x2="342" y2="124" stroke="url(#role-line-l)" stroke-width="0.7"/>
  <line x1="558" y1="124" x2="792" y2="124" stroke="url(#role-line-r)" stroke-width="0.7"/>
  <text x="450" y="128" font-family="'Courier New', monospace" font-size="12" fill="#39d353" fill-opacity="0.85" text-anchor="middle" letter-spacing="3.5">FULL STACK DEVELOPER · MERN SPECIALIST</text>

  <!-- ── LOCATION PILL ── -->
  <rect x="370" y="146" width="160" height="22" rx="6" fill="#39d353" fill-opacity="0.07" stroke="#39d353" stroke-width="0.6" stroke-opacity="0.3"/>
  <text x="450" y="161" font-family="'Courier New', monospace" font-size="10" fill="#39d353" fill-opacity="0.75" text-anchor="middle" letter-spacing="0.5">📍 Tamil Nadu, India</text>

  <!-- Bottom fade -->
  <rect x="0" y="168" width="900" height="32" fill="url(#bottom-fade)"/>

  <!-- Outer border -->
  <rect width="900" height="200" fill="none" stroke="#39d353" stroke-width="0.7" stroke-opacity="0.12"/>
</svg>
